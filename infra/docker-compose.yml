services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: foc
      POSTGRES_PASSWORD: foc
      POSTGRES_DB: foc
    volumes:
      - foc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foc -d foc"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://foc:foc@postgres:5432/foc
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  foc_pgdata:
